<!DOCTYPE html>\n<html lang='en'>\n<head>\n    <meta charset='UTF-8'>\n    <meta name='viewport' content='width=device-width, initial-scale=1.0'>\n    <title>Digital Clock</title>\n    <style>\n        body { font-family: Arial, sans-serif; text-align: center; margin-top: 100px; }\n        .clock { font-size: 2em; }\n    </style>\n</head>\n<body>\n    <h1>Digital Clock</h1>\n    <div class='clock'>\n        <div id='utc' class='time'></div>\n        <div id='est' class='time'></div>\n        <div id='pst' class='time'></div>\n    </div>\n    <script>\n        function updateClocks() {\n            const utcDate = new Date();\n            document.getElementById('utc').textContent = 'UTC: ' + utcDate.toISOString().replace('T', ' ').substring(0, 19);\n\n            const estDate = new Date(utcDate.getTime() - 5 * 60 * 60 * 1000);\n            document.getElementById('est').textContent = 'EST: ' + estDate.toISOString().replace('T', ' ').substring(0, 19);\n\n            const pstDate = new Date(utcDate.getTime() - 8 * 60 * 60 * 1000);\n            document.getElementById('pst').textContent = 'PST: ' + pstDate.toISOString().replace('T', ' ').substring(0, 19);\n        }\n        setInterval(updateClocks, 1000);\n        updateClocks();\n    </script>\n</body>\n</html>\n
